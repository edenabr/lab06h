name: Release packages

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-test:
    name: build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++

      - name: Configure
        run: |
          cmake -S . -B _build -DBUILD_TESTS=OFF -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: |
          cmake --build _build --config Release

      - name: Run solver
        run: |
          echo "1 2 1" | ./_build/solver_application/solver

  package-linux:
    name: package linux deb rpm tar gz zip
    runs-on: ubuntu-latest
    needs: build-test
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ rpm zip

      - name: Configure
        run: |
          cmake -S . -B _build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: |
          cmake --build _build --config Release

      - name: Create binary packages
        run: |
          mkdir -p packages
          cpack --config _build/CPackConfig.cmake -G DEB -B packages
          cpack --config _build/CPackConfig.cmake -G RPM -B packages
          cpack --config _build/CPackConfig.cmake -G TGZ -B packages
          cpack --config _build/CPackConfig.cmake -G ZIP -B packages

      - name: Create source archives
        run: |
          git archive --format=tar.gz --prefix=lab06h-${GITHUB_REF_NAME}/ -o packages/lab06h-source-${GITHUB_REF_NAME}.tar.gz HEAD
          git archive --format=zip --prefix=lab06h-${GITHUB_REF_NAME}/ -o packages/lab06h-source-${GITHUB_REF_NAME}.zip HEAD

      - name: Upload packages to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: packages/*
          overwrite_files: true

  package-macos:
    name: package macos dmg
    runs-on: macos-latest
    needs: build-test
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        run: |
          cmake -S . -B _build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: |
          cmake --build _build --config Release

      - name: Create DMG package
        run: |
          mkdir -p packages
          cpack --config _build/CPackConfig.cmake -G DragNDrop -B packages

      - name: Upload DMG to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: packages/*
          overwrite_files: true

  package-windows:
    name: package windows msi
    runs-on: windows-latest
    needs: build-test
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install WiX
        shell: powershell
        run: |
          choco install wixtoolset -y
          echo "C:\Program Files (x86)\WiX Toolset v3.14\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Configure
        shell: powershell
        run: |
          cmake -S . -B _build -G "Visual Studio 17 2022" -A x64

      - name: Build
        shell: powershell
        run: |
          cmake --build _build --config Release

      - name: Create MSI package
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path packages
cpack --config _build/CPackConfig.cmake -G WIX -B packages -C Release

      - name: Upload MSI to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: packages/*
          overwrite_files: true
